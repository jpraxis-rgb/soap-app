<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
<p id="msg">Processando login...</p>
<script>
  var params = new URLSearchParams(window.location.search);
  var authData = params.get('google_auth');
  var authError = params.get('google_auth_error');
  if (authData) {
    localStorage.setItem('google_auth_result', authData);
  } else if (authError) {
    localStorage.setItem('google_auth_error', authError);
  }
  // Small delay to ensure localStorage write flushes before close
  setTimeout(function() {
    window.close();
    // If window.close() didn't work (browser restriction), show fallback message
    setTimeout(function() {
      document.getElementById('msg').textContent =
        'Login concluído! Você pode fechar esta janela.';
    }, 300);
  }, 100);
</script>
</body>
</html>
